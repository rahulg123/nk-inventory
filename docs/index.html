<!doctype html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg:       var(--tg-theme-bg-color, #ebedf0);
      --panel:    var(--tg-theme-secondary-bg-color, #ffffff);
      --text:     var(--tg-theme-text-color, #222222);
      --muted:    #83878a;
      --hint:     #74787a;
      --line:     rgba(0,0,0,0.07);
      --btn:      #f8a917;
      --btn-text: #ffffff;
      --red:      #e64d44;
      --green:    #31b545;
      --r:        10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      font-size: 13px;
      line-height: 16px;
      font-weight: 400;
      -webkit-text-size-adjust: 100%;
    }

    /* ── Screens ── */
    .screen { display: none; min-height: 100vh; }
    .screen.active { display: block; }
    #s-loading.active {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; padding: 60px 24px; text-align: center;
    }

    /* ── Spinner ── */
    .spinner {
      width: 34px; height: 34px;
      border: 3px solid var(--line); border-top-color: var(--green);
      border-radius: 50%; animation: spin .75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Header ── */
    .hdr {
      position: sticky; top: 0; z-index: 10;
      background: var(--panel);
      box-shadow: 0 0.5px rgba(0,0,0,.1);
      padding: 12px 16px;
      display: flex; align-items: center; gap: 8px;
    }
    .hdr-title { flex: 1; text-align: center; font-weight: 700; font-size: 17px; text-transform: uppercase; letter-spacing: .02em; }
    .hdr-btn {
      min-width: 56px; height: 32px; border: none; background: none;
      color: var(--green); font: inherit; font-size: 15px; font-weight: 500;
      cursor: pointer; text-align: left;
    }

    /* ── Godowns ── */
    .user-row {
      padding: 10px 16px; display: flex;
      justify-content: space-between; align-items: center;
      background: var(--panel); box-shadow: 0 0.5px rgba(0,0,0,.07);
    }
    .user-name { font-weight: 700; font-size: 14px; }
    .user-sub  { font-size: 12px; color: var(--muted); margin-top: 1px; }
    .page { padding: 12px; }
    .section-lbl {
      font-size: 11px; font-weight: 700; letter-spacing: .1em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 10px; padding: 0 4px;
    }
    .godown-grid { display: grid; gap: 8px; }
    .godown-card {
      background: var(--panel);
      box-shadow: 0 0.5px rgba(0,0,0,.07);
      border-radius: var(--r); padding: 18px 16px;
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; width: 100%; font: inherit; color: var(--text); text-align: left;
    }
    .godown-card:active { opacity: .7; }
    .godown-name { font-size: 17px; font-weight: 700; line-height: 21px; text-transform: uppercase; }
    .godown-meta { font-size: 13px; color: var(--muted); margin-top: 4px; }
    .godown-arrow { font-size: 22px; color: var(--muted); }

    /* ── Search ── */
    .search-bar {
      padding: 8px 10px; background: var(--bg);
      box-shadow: 0 0.5px rgba(0,0,0,.07);
      position: sticky; top: 43px; z-index: 9;
    }
    .search-input {
      width: 100%; background: var(--panel);
      border: none; border-radius: 8px;
      padding: 9px 12px; font: inherit; font-size: 14px;
      outline: none; color: var(--text);
      box-shadow: 0 0.5px rgba(0,0,0,.07);
    }

    /* ── Item grid — 3 columns like DK ── */
    .items-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-around;
      padding: 8px 6px 110px;
      max-width: 480px;
      margin: 0 auto;
    }
    .items-grid:after { content: ''; flex-grow: 2; }

    .item-card {
      position: relative;
      width: 112px;
      min-height: 135px;
      padding: 14px 8px 12px;
      margin: 4px;
      background: var(--panel);
      border-radius: var(--r);
      box-shadow: 0 0.5px rgba(0,0,0,.07);
      display: flex; flex-direction: column; align-items: center; gap: 0;
      text-align: center;
    }
    .item-card.changed { outline: 2px solid var(--green); outline-offset: -1px; }

    .item-badge {
      position: absolute; top: -8px; right: -8px;
      min-width: 22px; height: 22px; border-radius: 11px; padding: 2px 5px;
      background: var(--btn); color: #fff;
      font-size: 13px; font-weight: 700; line-height: 18px;
      display: flex; align-items: center; justify-content: center;
      border: 2px solid var(--bg);
    }
    .item-badge.neg { background: var(--red); }

    .item-card-name {
      font-size: 13px; font-weight: 700; line-height: 17px;
      display: -webkit-box; -webkit-line-clamp: 3;
      -webkit-box-orient: vertical; overflow: hidden;
      width: 100%;
    }
    .item-card-qty { font-size: 12px; color: var(--muted); line-height: 15px; margin-top: 5px; flex: 1; width: 100%; }

    .new-badge {
      display: inline-block; background: var(--green); color: #fff;
      font-size: 9px; font-weight: 700; padding: 1px 4px;
      border-radius: 3px; margin-left: 3px; vertical-align: middle;
      text-transform: uppercase;
    }

    /* Update / ADD button */
    .update-btn {
      width: 86px; margin-top: auto;
      border: none; border-radius: 7px;
      background: var(--btn); color: #fff;
      font: inherit; font-size: 14px; font-weight: 700; line-height: 18px;
      cursor: pointer; padding: 6px 0;
      text-transform: uppercase; letter-spacing: .02em;
      height: 30px; flex-shrink: 0;
    }
    .update-btn:active { opacity: .8; }

    /* Stepper (expanded) */
    .card-stepper {
      display: flex; align-items: center;
      justify-content: space-between; gap: 3px;
      margin-top: auto; width: 100%;
    }
    .cs-btn {
      width: 36px; height: 30px; border: none; border-radius: 7px;
      font-size: 18px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .cs-btn:active { opacity: .75; }
    .cs-minus { background: var(--red); color: #fff; }
    .cs-plus  { background: var(--btn); color: #fff; }
    .cs-delta {
      flex: 1; text-align: center;
      font-size: 15px; font-weight: 800; font-variant-numeric: tabular-nums;
    }
    .cs-delta.pos { color: var(--green); }
    .cs-delta.neg { color: var(--red); }
    .cs-delta.z   { color: var(--muted); font-weight: 600; }

    /* Add new card */
    .add-new-card {
      background: transparent;
      border: 1.5px dashed var(--btn);
      border-radius: var(--r);
      width: 112px; margin: 4px;
      min-height: 135px;
      padding: 16px 8px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 5px;
      cursor: pointer; font: inherit; color: var(--btn);
      font-size: 12px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .04em;
      text-align: center;
    }
    .add-new-card:active { opacity: .7; }
    .add-new-plus { font-size: 28px; font-weight: 300; line-height: 1; }

    /* ── Bottom bar ── */
    .bot-bar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
      padding: 8px 14px calc(8px + env(safe-area-inset-bottom));
      background: var(--bg); box-shadow: 0 -0.5px rgba(0,0,0,.1);
    }
    .bot-btn {
      width: 100%; padding: 15px; border: none; border-radius: 10px;
      background: var(--green); color: #fff;
      font: inherit; font-size: 15px; font-weight: 700;
      cursor: pointer; letter-spacing: .03em; text-transform: uppercase;
    }
    .bot-btn:active { opacity: .85; }
    .bot-btn:disabled { opacity: .45; }

    /* ── Modal ── */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 30; display: flex; align-items: flex-end; }
    .overlay.hidden { display: none; }
    .sheet {
      background: var(--panel); border-radius: var(--r) var(--r) 0 0;
      padding: 24px 20px calc(24px + env(safe-area-inset-bottom)); width: 100%;
    }
    .sheet-title { font-size: 17px; font-weight: 700; margin-bottom: 18px; text-transform: uppercase; letter-spacing: .02em; }
    .f-label { display: block; font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
    .f-input {
      width: 100%; background: var(--bg); border: none;
      border-radius: 8px; padding: 12px 14px; font: inherit; font-size: 15px;
      outline: none; color: var(--text); margin-bottom: 14px;
    }
    .sheet-btns { display: flex; gap: 10px; margin-top: 4px; }
    .sheet-cancel { flex: 1; padding: 13px; border: 1.5px solid var(--line); border-radius: var(--r); background: transparent; font: inherit; font-size: 14px; font-weight: 600; color: var(--text); cursor: pointer; }
    .sheet-ok { flex: 2; padding: 13px; border: none; border-radius: var(--r); background: var(--green); font: inherit; font-size: 14px; font-weight: 700; color: #fff; cursor: pointer; }
    .sheet-ok:active, .sheet-cancel:active { opacity: .7; }

    /* ── Review ── */
    .rev-page { padding: 16px; padding-bottom: 100px; }
    .rev-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .rev-lbl { font-size: 17px; font-weight: 700; text-transform: uppercase; letter-spacing: .02em; }
    .rev-edit { background: none; border: none; color: var(--green); font: inherit; font-size: 15px; font-weight: 500; cursor: pointer; }
    .rev-list { margin-bottom: 18px; }
    .rev-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 0; border-bottom: 1px solid var(--line); gap: 12px;
    }
    .rev-item:last-child { border-bottom: none; }
    .rev-item-name { font-weight: 700; font-size: 15px; line-height: 18px; }
    .rev-item-sub { font-size: 13px; color: var(--muted); margin-top: 2px; }
    .rev-delta { font-weight: 800; font-size: 17px; font-variant-numeric: tabular-nums; flex-shrink: 0; }
    .rev-delta.pos { color: var(--green); }
    .rev-delta.neg { color: var(--red); }
    .note-lbl { font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-bottom: 7px; }
    .note-area {
      width: 100%; background: var(--panel); border: none;
      border-radius: 8px; padding: 12px 14px; font: inherit; font-size: 15px;
      min-height: 80px; resize: none; outline: none; color: var(--text);
      box-shadow: 0 0.5px rgba(0,0,0,.07);
    }

    /* ── Error ── */
    .err-box {
      margin: 16px; padding: 16px; background: var(--panel);
      box-shadow: 0 0.5px rgba(0,0,0,.07); border-radius: var(--r);
      font-size: 14px; line-height: 1.55; white-space: pre-wrap;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<!-- Loading -->
<div id="s-loading" class="screen active">
  <div class="spinner"></div>
  <div style="color:var(--muted);font-size:16px" id="load-status">Connecting…</div>
  <div style="color:var(--red);font-size:14px;max-width:280px;display:none" id="load-err"></div>
  <button onclick="loadInventory()" style="padding:12px 28px;border:none;border-radius:10px;background:var(--btn);color:#fff;font:inherit;font-size:16px;font-weight:700;cursor:pointer;display:none" id="retry-btn">Retry</button>
</div>

<!-- Error -->
<div id="s-error" class="screen">
  <div class="err-box" id="err-msg"></div>
</div>

<!-- Godowns -->
<div id="s-godowns" class="screen">
  <div class="hdr">
    <div style="min-width:56px"></div>
    <div class="hdr-title" style="font-family:Georgia,serif;font-size:22px">NK Inventory</div>
    <div style="min-width:56px"></div>
  </div>
  <div class="user-row hidden" id="user-row">
    <div><div class="user-name" id="user-name"></div><div class="user-sub">Logged in</div></div>
    <div style="font-size:14px;color:var(--muted)" id="sync-lbl">Synced</div>
  </div>
  <div class="page">
    <div class="section-lbl">Select Godown</div>
    <div class="godown-grid" id="godown-grid"></div>
  </div>
</div>

<!-- Items -->
<div id="s-items" class="screen">
  <div class="hdr">
    <button class="hdr-btn" id="items-back">‹ Back</button>
    <div class="hdr-title" id="items-title"></div>
    <div style="min-width:56px"></div>
  </div>
  <div class="search-bar">
    <input class="search-input" id="search" type="search" placeholder="Search items…" autocomplete="off">
  </div>
  <div class="items-grid" id="items-list"></div>
  <div class="bot-bar hidden" id="rev-bar">
    <button class="bot-btn" id="rev-bar-btn"></button>
  </div>
</div>

<!-- Review -->
<div id="s-review" class="screen">
  <div class="hdr">
    <button class="hdr-btn" id="review-back">‹ Back</button>
    <div class="hdr-title">Review</div>
    <div style="min-width:56px"></div>
  </div>
  <div class="rev-page">
    <div class="rev-hdr">
      <div class="rev-lbl">YOUR CHANGES</div>
      <button class="rev-edit" id="rev-edit">Edit</button>
    </div>
    <div class="rev-list" id="rev-list"></div>
    <div class="note-lbl" style="margin-top:4px">Add comment…</div>
    <textarea class="note-area" id="note-input" placeholder="Any special requests, details, etc."></textarea>
  </div>
  <div class="bot-bar">
    <button class="bot-btn" id="confirm-btn"></button>
  </div>
</div>

<!-- Add new item modal -->
<div class="overlay hidden" id="modal">
  <div class="sheet">
    <div class="sheet-title">Add New Item</div>
    <label class="f-label">Item name</label>
    <input class="f-input" id="new-name" type="text" placeholder="e.g. Widget A" autocomplete="off">
    <label class="f-label">Initial quantity (cases)</label>
    <input class="f-input" id="new-qty" type="number" inputmode="decimal" min="0" step="1" placeholder="0">
    <div class="sheet-btns">
      <button class="sheet-cancel" id="modal-cancel">Cancel</button>
      <button class="sheet-ok" id="modal-ok">Add Item</button>
    </div>
  </div>
</div>

<script>
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbysx8HN6BSHqIHXcm4G8seS5VzmV6tCNs2o4NlvIfAKgl_jg2N1A6mprN9rYWFEZgsTMA/exec';

  const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
  if (tg) { tg.ready(); tg.expand(); }

  function getInitData() {
    if (tg && tg.initData) return tg.initData;
    try {
      const p = new URLSearchParams(window.location.hash.slice(1));
      const d = p.get('tgWebAppData');
      if (d) return d;
    } catch (e) {}
    return '';
  }

  // ── State ──
  const S = {
    godowns: [], stock: [], user: null,
    godown: '',
    changes: {},   // item → { godown, item, delta, currentQty }
    newItems: [],  // { godown, item, quantity }
    expanded: new Set(), // item keys showing stepper
    search: '',
    submitting: false
  };

  // ── Screens ──
  const SCREENS = ['loading','error','godowns','items','review'];
  function show(name) {
    SCREENS.forEach(id => {
      const el = document.getElementById('s-' + id);
      el.style.display = '';
      el.classList.toggle('active', id === name);
    });
  }

  // ── JSONP ──
  function jsonp(params) {
    return new Promise((resolve, reject) => {
      const cb = '__gas' + Date.now() + Math.random().toString(36).slice(2);
      const timer = setTimeout(() => {
        delete window[cb];
        reject(new Error('Timed out — GAS may be cold-starting. Tap Retry.'));
      }, 15000);
      window[cb] = data => { clearTimeout(timer); delete window[cb]; resolve(data); };
      const s = document.createElement('script');
      s.onerror = () => { clearTimeout(timer); delete window[cb]; reject(new Error('Failed to reach server.')); };
      s.src = GAS_URL + '?' + new URLSearchParams({ ...params, callback: cb });
      document.head.appendChild(s);
    });
  }

  // ── Load ──
  const CACHE_KEY = 'nk_inv_v1';

  function loadInventory() {
    if (GAS_URL.includes('PASTE_GAS')) {
      document.getElementById('err-msg').textContent = 'Set GAS_URL in index.html to your Apps Script /exec URL.';
      show('error'); return;
    }
    document.getElementById('load-err').style.display = 'none';
    document.getElementById('retry-btn').style.display = 'none';
    const cached = localStorage.getItem(CACHE_KEY);
    if (cached) {
      try { applyData(JSON.parse(cached)); show('godowns'); fetchInventory(true); return; }
      catch (e) {}
    }
    show('loading');
    fetchInventory(false);
  }

  function setStatus(msg) { const el = document.getElementById('load-status'); if (el) el.textContent = msg; }

  function fetchInventory(background) {
    if (!background) {
      let n = 0;
      const t = setInterval(() => { n++; setStatus('Connecting… (' + n + 's)'); }, 1000);
      window.__tick = t;
    }
    jsonp({ action: 'load', initData: getInitData() })
      .then(d => {
        clearInterval(window.__tick);
        if (!d.ok) throw new Error(d.error);
        localStorage.setItem(CACHE_KEY, JSON.stringify(d));
        applyData(d);
        document.getElementById('sync-lbl').textContent = 'Synced';
        if (!background) show('godowns'); else renderGodowns();
      })
      .catch(err => {
        clearInterval(window.__tick);
        if (!background) {
          setStatus('Could not load');
          document.getElementById('load-err').textContent = String(err.message || err);
          document.getElementById('load-err').style.display = 'block';
          document.getElementById('retry-btn').style.display = 'block';
        } else {
          document.getElementById('sync-lbl').textContent = 'Offline';
        }
      });
  }

  function applyData(d) {
    S.godowns = d.godowns || [];
    S.stock   = d.stock   || [];
    S.user    = d.user    || null;
    if (S.user) {
      document.getElementById('user-name').textContent = S.user.name;
      document.getElementById('user-row').classList.remove('hidden');
    }
    renderGodowns();
  }

  // ── Godowns ──
  function renderGodowns() {
    const grid = document.getElementById('godown-grid');
    grid.innerHTML = S.godowns.map(g => {
      const count = S.stock.filter(s => s.godown === g).length;
      const pending = Object.values(S.changes).filter(c => c.godown === g).length
                    + S.newItems.filter(n => n.godown === g).length;
      return '<button class="godown-card" data-g="' + x(g) + '">' +
        '<div>' +
          '<div class="godown-name">' + x(g) + '</div>' +
          '<div class="godown-meta">' + count + ' items' + (pending ? ' · <span style="color:var(--green)">' + pending + ' pending</span>' : '') + '</div>' +
        '</div>' +
        '<div class="godown-arrow">›</div>' +
      '</button>';
    }).join('');
    grid.querySelectorAll('.godown-card').forEach(b =>
      b.addEventListener('click', () => openGodown(b.dataset.g))
    );
  }

  // ── Items ──
  function openGodown(g) {
    S.godown = g; S.search = '';
    // keep expanded state for items that have changes; clear others
    S.expanded = new Set(Object.keys(S.changes));
    document.getElementById('items-title').textContent = g;
    document.getElementById('search').value = '';
    renderItems();
    show('items');
  }

  function renderItems() {
    const g = S.godown;
    const q = S.search.toLowerCase();
    const rows = S.stock.filter(s => s.godown === g && (!q || s.item.toLowerCase().includes(q)));
    const news = S.newItems.filter(n => n.godown === g && (!q || n.item.toLowerCase().includes(q)));

    const cards = rows.map(s => itemCard(s.item, s.quantity, false)).join('')
                + news.map(n => itemCard(n.item, n.quantity, true)).join('')
                + '<button class="add-new-card" id="add-new-btn"><span class="add-new-plus">+</span>Add new item</button>';

    document.getElementById('items-list').innerHTML = cards;

    // Expand button
    document.querySelectorAll('.update-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const item = btn.dataset.item;
        S.expanded.add(g + '::' + item);
        renderItems();
      });
    });

    // Stepper buttons
    document.querySelectorAll('.cs-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const item = btn.dataset.item;
        const dir  = btn.dataset.dir === 'p' ? 1 : -1;
        const isNew = btn.dataset.new === '1';
        if (isNew) { adjustNew(g, item, dir); }
        else {
          const row = S.stock.find(s => s.godown === g && s.item === item);
          adjustChange(g, item, dir, row ? row.quantity : 0);
        }
      });
    });

    document.getElementById('add-new-btn').addEventListener('click', openModal);
    updateRevBar();
  }

  function itemCard(item, currentQty, isNew) {
    const g = S.godown;
    const key = g + '::' + item;
    let delta = 0;
    if (isNew) {
      const n = S.newItems.find(n => n.godown === g && n.item === item);
      delta = n ? n.quantity : 0;
    } else {
      delta = S.changes[key] ? S.changes[key].delta : 0;
    }

    const changed = delta !== 0;
    const showStepper = S.expanded.has(key) || changed || isNew;
    const sign = delta > 0 ? '+' : '';
    const dc = delta > 0 ? 'pos' : delta < 0 ? 'neg' : 'z';

    const badge = changed
      ? '<div class="item-badge ' + (delta < 0 ? 'neg' : '') + '">' + sign + delta + '</div>' : '';

    const newBadge = isNew ? '<span class="new-badge">NEW</span>' : '';

    const cases = n => fmt(n) + ' ' + (n === 1 ? 'case' : 'cases');
    let qtyLine;
    if (isNew) {
      qtyLine = 'New · ' + cases(delta);
    } else if (changed) {
      qtyLine = cases(currentQty) + ' → ' + cases(currentQty + delta);
    } else {
      qtyLine = cases(currentQty);
    }

    const bottom = showStepper
      ? '<div class="card-stepper">' +
          '<button class="cs-btn cs-minus" data-item="' + x(item) + '" data-dir="m" data-new="' + (isNew?'1':'0') + '">−</button>' +
          '<span class="cs-delta ' + dc + '">' + sign + delta + '</span>' +
          '<button class="cs-btn cs-plus"  data-item="' + x(item) + '" data-dir="p" data-new="' + (isNew?'1':'0') + '">+</button>' +
        '</div>'
      : '<button class="update-btn" data-item="' + x(item) + '">Update</button>';

    return '<div class="item-card' + (changed ? ' changed' : '') + '">' +
      badge +
      '<div class="item-card-name">' + x(item) + newBadge + '</div>' +
      '<div class="item-card-qty">' + qtyLine + '</div>' +
      bottom +
    '</div>';
  }

  function adjustChange(g, item, dir, currentQty) {
    const key = g + '::' + item;
    if (!S.changes[key]) S.changes[key] = { godown: g, item, delta: 0, currentQty };
    const next = S.changes[key].delta + dir;
    if (currentQty + next < 0) return;
    S.changes[key].delta = next;
    if (next === 0) delete S.changes[key];
    renderItems();
  }

  function adjustNew(g, item, dir) {
    const n = S.newItems.find(n => n.godown === g && n.item === item);
    if (n) n.quantity = Math.max(0, n.quantity + dir);
    renderItems();
  }

  function updateRevBar() {
    const total = Object.keys(S.changes).length + S.newItems.length;
    const bar = document.getElementById('rev-bar');
    const btn = document.getElementById('rev-bar-btn');
    if (total > 0) {
      bar.classList.remove('hidden');
      const here = Object.values(S.changes).filter(c => c.godown === S.godown).length
                 + S.newItems.filter(n => n.godown === S.godown).length;
      const label = here < total
        ? 'VIEW ORDER  ·  ' + total + ' change' + (total !== 1 ? 's' : '') + ' across godowns'
        : 'VIEW ORDER  ·  ' + total + ' change' + (total !== 1 ? 's' : '');
      btn.textContent = label;
    } else {
      bar.classList.add('hidden');
    }
  }

  // ── Review ──
  function renderReview() {
    const rows = [];
    Object.values(S.changes).forEach(c => {
      const sign = c.delta > 0 ? '+' : '';
      rows.push(
        '<div class="rev-item">' +
          '<div>' +
            '<div class="rev-item-name">' + x(c.item) + '</div>' +
            '<div class="rev-item-sub">' + x(c.godown) + ' · ' + fmt(c.currentQty) + ' → ' + fmt(c.currentQty + c.delta) + ' cases</div>' +
          '</div>' +
          '<div class="rev-delta ' + (c.delta > 0 ? 'pos' : 'neg') + '">' + sign + c.delta + '</div>' +
        '</div>'
      );
    });
    S.newItems.forEach(n => {
      rows.push(
        '<div class="rev-item">' +
          '<div>' +
            '<div class="rev-item-name">' + x(n.item) + ' <span class="new-badge">NEW</span></div>' +
            '<div class="rev-item-sub">' + x(n.godown) + ' · 0 → ' + fmt(n.quantity) + ' cases</div>' +
          '</div>' +
          '<div class="rev-delta pos">+' + n.quantity + '</div>' +
        '</div>'
      );
    });
    document.getElementById('rev-list').innerHTML = rows.join('');
    const total = Object.keys(S.changes).length + S.newItems.length;
    document.getElementById('confirm-btn').textContent =
      'CONFIRM  ·  ' + total + ' change' + (total !== 1 ? 's' : '');
  }

  // ── Submit ──
  function submit() {
    if (S.submitting) return;
    S.submitting = true;
    const btn = document.getElementById('confirm-btn');
    btn.disabled = true; btn.textContent = 'Submitting…';

    const movements = Object.values(S.changes).map(c => ({ godown: c.godown, item: c.item, delta: c.delta }));
    const note = document.getElementById('note-input').value.trim();

    jsonp({ action: 'batchSubmit', initData: getInitData(), data: JSON.stringify({ movements, newItems: S.newItems, note }) })
      .then(d => {
        if (!d.ok) throw new Error(d.error);
        S.changes = {}; S.newItems = []; S.expanded = new Set();
        localStorage.setItem(CACHE_KEY, JSON.stringify(d));
        applyData(d);
        document.getElementById('note-input').value = '';
        if (tg) tg.HapticFeedback.notificationOccurred('success');
        show('godowns');
      })
      .catch(err => {
        if (tg) tg.HapticFeedback.notificationOccurred('error');
        alert(err.message || String(err));
        btn.disabled = false;
        renderReview();
      })
      .finally(() => { S.submitting = false; });
  }

  // ── Modal ──
  function openModal() {
    document.getElementById('new-name').value = '';
    document.getElementById('new-qty').value = '';
    document.getElementById('modal').classList.remove('hidden');
    setTimeout(() => document.getElementById('new-name').focus(), 80);
  }

  // ── Helpers ──
  function x(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function fmt(n) { return new Intl.NumberFormat('en-IN').format(n); }

  // ── Events ──
  document.getElementById('items-back').addEventListener('click', () => { show('godowns'); renderGodowns(); });
  document.getElementById('search').addEventListener('input', e => { S.search = e.target.value; renderItems(); });

  document.getElementById('modal-cancel').addEventListener('click', () => document.getElementById('modal').classList.add('hidden'));
  document.getElementById('modal-ok').addEventListener('click', () => {
    const name = document.getElementById('new-name').value.trim();
    const qty  = Math.max(0, Number(document.getElementById('new-qty').value) || 0);
    if (!name) { document.getElementById('new-name').focus(); return; }
    const g = S.godown;
    if (S.stock.some(s => s.godown === g && s.item.toLowerCase() === name.toLowerCase()) ||
        S.newItems.some(n => n.godown === g && n.item.toLowerCase() === name.toLowerCase())) {
      alert('"' + name + '" already exists in this godown.'); return;
    }
    S.newItems.push({ godown: g, item: name, quantity: qty });
    document.getElementById('modal').classList.add('hidden');
    renderItems();
  });

  document.getElementById('rev-bar-btn').addEventListener('click', () => { renderReview(); show('review'); });
  document.getElementById('review-back').addEventListener('click', () => { show('items'); renderItems(); });
  document.getElementById('rev-edit').addEventListener('click', () => { show('items'); renderItems(); });
  document.getElementById('confirm-btn').addEventListener('click', submit);

  // ── Start ──
  loadInventory();
</script>
</body>
</html>
